site_name: Dmitrii Notes
docs_dir: docs

theme:
  name: material
  language: ru
  font: false
  palette:
    - scheme: default
      primary: white
      accent: indigo
  features:
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Main: index.md
  - Security:
      - security/index.md
  - Docker:
      - docker/index.md
      - General Notes: docker/docker.md
  - k8s:
      - k8s/index.md
  - Articles:
      - articles/index.md
      - GitLab runner in RAM: articles/gitlab-runner_in_ram.md
      - How to Export GitLab Projects: articles/gitlab_repos_exporter.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true
      title: "На этой странице"

extra_css:
  - stylesheets/extra.css